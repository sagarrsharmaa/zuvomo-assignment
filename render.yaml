databases:
  - name: trading-signals-db
    plan: free
    databaseName: trading_signals
    user: trader

services:
  - type: web
    name: trading-signal-tracker-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: trading-signals-db
          property: connectionString
      - key: PORT
        value: 10000
      - key: POLL_INTERVAL_MS
        value: 10000
      - key: BINANCE_CACHE_TTL_MS
        value: 5000
      - key: NODE_ENV
        value: production
